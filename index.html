<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWash Pro - Smart Automated Car Wash Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Material Symbols -->

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDNJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
    <!-- Lucide Icons (as fallback / extra support) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.407.0/umd/lucide.min.js" crossorigin></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 4px;
        }
        /* Soft Shadow Style for Material Look */
        .material-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
        }
        .material-shadow-lg {
            box-shadow: 0 10px 30px -5px rgba(37, 99, 235, 0.1), 0 4px 12px -2px rgba(0, 0, 0, 0.05);
        }
        /* Device simulators */
        .iphone-frame {
            width: 393px;
            height: 852px;
            border: 12px solid #1e293b;
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.3);
        }
        .iphone-dynamic-island {
            width: 110px;
            height: 30px;
            background: #1e293b;
            border-radius: 20px;
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
        .iphone-home-indicator {
            width: 140px;
            height: 5px;
            background: #94a3b8;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
        .desktop-canvas {
            width: 100%;
            max-width: 1440px;
            min-height: 900px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            overflow: hidden;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        brand: {
                            blue: '#2563EB',
                            blueDark: '#1D4ED8',
                            blueLight: '#DBEAFE',
                            lightBg: '#F8FAFC',
                            darkBg: '#0F172A',
                            slate: '#64748B'
                        }
                    },
                    borderRadius: {
                        'xl': '12px'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- STABLE SEED DATA (ERD SYNCHRONIZED) ---
        const INITIAL_ACCOUNTS = [
            { accountId: "A001", fullName: "Admin Manager", email: "admin@autowash.com", role: "Admin", isActive: true, password: "admin123" },
            { accountId: "A002", fullName: "Nguyễn Văn A", email: "customer@autowash.com", role: "Customer", isActive: true, password: "customer123" }
        ];

        const INITIAL_CUSTOMERS = [
            { customerId: "C001", accountId: "A002", pointBalance: 420, tierId: "T003" } // Gold Tier
        ];

        const INITIAL_VEHICLES = [
            { vehicleId: "V001", customerId: "C001", licensePlate: "29A-999.99", brand: "Honda", model: "SH 150i", vehicleName: "SH Đen bóng", registeredAt: "2026-06-10T08:00:00Z" },
            { vehicleId: "V002", customerId: "C001", licensePlate: "30E-888.88", brand: "Yamaha", model: "Exciter 155", vehicleName: "Exciter Xanh", registeredAt: "2026-07-01T10:00:00Z" }
        ];

        const INITIAL_SERVICES = [
            { serviceId: "S001", serviceName: "Rửa Tiêu Chuẩn (Standard Wash)", category: "Wash Package", basePrice: 60000, estimateMinutes: 20, rating: 4.8, reviewsCount: 128, description: "Rửa bọt tuyết, hút bụi thảm chân, sấy khô." },
            { serviceId: "S002", serviceName: "Rửa Cao Cấp (Premium Wash)", category: "Wash Package", basePrice: 120000, estimateMinutes: 35, rating: 4.9, reviewsCount: 254, description: "Rửa bọt tuyết 3 lớp, đánh bóng lốp, vệ sinh nội thất cơ bản, xịt khử mùi cabin." },
            { serviceId: "S003", serviceName: "Vệ Sinh Khoang Máy chuyên sâu", category: "Add-on", basePrice: 150000, estimateMinutes: 30, rating: 4.7, reviewsCount: 64, description: "Dọn dẹp dầu mỡ dư thừa, phủ bóng dưỡng dây điện khoang máy." },
            { serviceId: "S004", serviceName: "Đánh Bóng Gầm chống rỉ", category: "Add-on", basePrice: 80000, estimateMinutes: 15, rating: 4.6, reviewsCount: 42, description: "Xịt dung dịch bảo vệ gầm và cổ xả." },
            { serviceId: "S005", serviceName: "Khử Khuẩn Ozone nội thất", category: "Add-on", basePrice: 50000, estimateMinutes: 10, rating: 4.9, reviewsCount: 88, description: "Sử dụng máy Ozone tiêu diệt 99% vi khuẩn, ẩm mốc cabin." }
        ];

        const INITIAL_TIERS = [
            { tierId: "T001", tierName: "Member", minRankingBalance: 0, discountPercent: 0, pointMultiplier: 1.0, bookingWindowDays: 7, maintainBalance: 0 },
            { tierId: "T002", tierName: "Silver", minRankingBalance: 150, discountPercent: 5, pointMultiplier: 1.1, bookingWindowDays: 10, maintainBalance: 100 },
            { tierId: "T003", tierName: "Gold", minRankingBalance: 350, discountPercent: 10, pointMultiplier: 1.2, bookingWindowDays: 14, maintainBalance: 250 },
            { tierId: "T004", tierName: "Platinum", minRankingBalance: 600, discountPercent: 15, pointMultiplier: 1.5, bookingWindowDays: 21, maintainBalance: 450 }
        ];

        const INITIAL_REWARDS = [
            { rewardId: "R001", rewardName: "Voucher Rửa Xe Giảm 50k", pointCost: 100, discountRate: 50000, isActive: true },
            { rewardId: "R002", rewardName: "Miễn Phí Khử Khuẩn Ozone", pointCost: 150, discountRate: 50000, isActive: true },
            { rewardId: "R003", rewardName: "Voucher Rửa Xe Giảm 100k", pointCost: 200, discountRate: 100000, isActive: true }
        ];

        const INITIAL_REWARD_REDEMPTIONS = [
            { redemptionId: "RDM001", customerId: "C001", rewardId: "R001", status: "Active", useAt: null, code: "AW50K-XYZ" }
        ];

        const INITIAL_BOOKINGS = [
            { 
                bookingId: "B001", customerId: "C001", vehicleId: "V001", 
                scheduleAt: "2026-07-16T09:00", status: "Confirmed", 
                basePrice: 120000, finalPrice: 108000, 
                createAt: "2026-07-14T08:00:00Z", checkInAt: null, 
                washingAt: null, completeAt: null, cancelledAt: null, 
                tierId: "T003", voucherId: null, employeeId: "EMP001", rating: null, reviewText: "" 
            }
        ];

        const INITIAL_EMPLOYEES = [
            { employeeId: "EMP001", fullName: "Trần Văn Bình", role: "Washing Staff", isActive: true, currentBay: "Wash Bay 1" },
            { employeeId: "EMP002", fullName: "Lê Hoàng Long", role: "Detailing Expert", isActive: true, currentBay: "Detaling Bay A" }
        ];

        const INITIAL_NOTIFICATIONS = [
            { id: 1, customerId: "C001", title: "Đặt lịch thành công!", body: "Lịch đặt B001 vào lúc 09:00 ngày 16/07 đã được xác nhận.", read: false, time: "5 phút trước" },
            { id: 2, customerId: "C001", title: "Thăng hạng thành viên!", body: "Chúc mừng bạn đã đạt hạng vàng Gold với nhiều ưu đãi chiết khấu 10%.", read: true, time: "1 ngày trước" }
        ];

        const INITIAL_LOYALTY_TRANSACTIONS = [
            { transactionId: "LT001", customerId: "C001", points: 420, reason: "Đăng ký thành viên & Đặt lịch", date: "2026-07-14T08:00:00Z" }
        ];

        function App() {
            // Workspace Controls
            const [viewMode, setViewMode] = useState("desktop-customer"); // "desktop-customer" | "mobile-customer" | "admin" | "db-inspector"
            const [isDarkMode, setIsDarkMode] = useState(true);
            
            // Database state
            const [db, setDb] = useState({});
            
            // Authentication & Account State
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState(null); // accounts table join customer table
            const [authMode, setAuthMode] = useState("landing"); // "landing" | "login" | "register" | "forgot"
            const [adminLoggedIn, setAdminLoggedIn] = useState(false);
            
            // Customer states (Desktop + Mobile)
            const [customerSubTab, setCustomerSubTab] = useState("home"); // "home" | "services" | "history" | "vehicles" | "loyalty" | "profile"
            const [selectedService, setSelectedService] = useState(null); // For detail view
            const [bookingWizard, setBookingWizard] = useState({ step: 1, packageId: "", addOns: [], vehicleId: "", date: "", time: "", voucherId: "", costs: null });
            const [vehicleInput, setVehicleInput] = useState({ brand: "", model: "", licensePlate: "", vehicleName: "" });
            const [profileInput, setProfileInput] = useState({ fullName: "", password: "", phone: "0901234567" });
            const [otpModal, setOtpModal] = useState(null); // OTP simulator
            
            // Admin panel states
            const [adminSubTab, setAdminSubTab] = useState("dashboard"); // "dashboard" | "bookings" | "customers" | "services" | "employees" | "loyalty" | "reports" | "settings"
            const [serviceEdit, setServiceEdit] = useState(null);
            const [employeeEdit, setEmployeeEdit] = useState(null);
            const [tierEdit, setTierEdit] = useState(null);
            const [rewardEdit, setRewardEdit] = useState(null);
            const [promotionCode, setPromotionCode] = useState({ code: "", discount: 0 });
            
            // Notification Center state
            const [notifications, setNotifications] = useState([]);
            
            // Splash / Onboarding Mobile App States
            const [mobileStage, setMobileStage] = useState("splash"); // "splash" | "onboarding" | "auth" | "app"
            const [onboardingIndex, setOnboardingIndex] = useState(0);

            // Fetch / Initialize database on mount
            useEffect(() => {
                const fetchTable = (key, initial) => {
                    const stored = localStorage.getItem(`aw_${key}`);
                    if (stored) return JSON.parse(stored);
                    localStorage.setItem(`aw_${key}`, JSON.stringify(initial));
                    return initial;
                };

                const currentDb = {
                    accounts: fetchTable("accounts", INITIAL_ACCOUNTS),
                    customers: fetchTable("customers", INITIAL_CUSTOMERS),
                    vehicles: fetchTable("vehicles", INITIAL_VEHICLES),
                    services: fetchTable("services", INITIAL_SERVICES),
                    tiers: fetchTable("tiers", INITIAL_TIERS),
                    bookings: fetchTable("bookings", INITIAL_BOOKINGS),
                    rewards: fetchTable("rewards", INITIAL_REWARDS),
                    redemptions: fetchTable("redemptions", INITIAL_REWARD_REDEMPTIONS),
                    employees: fetchTable("employees", INITIAL_EMPLOYEES),
                    loyaltyTransactions: fetchTable("loyalty_transactions", INITIAL_LOYALTY_TRANSACTIONS)
                };
                setDb(currentDb);
                setNotifications(INITIAL_NOTIFICATIONS);

                // Dark mode toggle in html class
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            // Save table state helper
            const updateTable = (key, data) => {
                localStorage.setItem(`aw_${key}`, JSON.stringify(data));
                setDb(prev => ({ ...prev, [key]: data }));
            };

            const resetDatabase = () => {
                localStorage.clear();
                window.location.reload();
            };

            // Login helper
            const runLogin = (email, password, isAdmin = false) => {
                if (isAdmin) {
                    const acc = db.accounts.find(a => a.email === email && a.password === password && a.role === "Admin");
                    if (acc) {
                        setAdminLoggedIn(true);
                        setAdminSubTab("dashboard");
                        alert("Đăng nhập Admin thành công!");
                    } else {
                        alert("Sai tài khoản hoặc mật khẩu Admin!");
                    }
                    return;
                }
                
                const acc = db.accounts.find(a => a.email === email && a.password === password);
                if (acc) {
                    if (!acc.isActive) {
                        alert("Tài khoản đang bị khóa!");
                        return;
                    }
                    const cust = db.customers.find(c => c.accountId === acc.accountId);
                    setCurrentUser({ ...acc, customer: cust });
                    setIsLoggedIn(true);
                    setCustomerSubTab("home");
                    setProfileInput({ fullName: acc.fullName, password: acc.password, phone: "0901234567" });
                    
                    if (viewMode === "mobile-customer") {
                        setMobileStage("app");
                    }
                    alert(`Chào mừng trở lại, ${acc.fullName}!`);
                } else {
                    alert("Tài khoản hoặc mật khẩu không chính xác!");
                }
            };

            // Booking wizard cost calculator
            const getCalculatedCosts = (packageId, addOnIds, voucherId) => {
                const pkg = db.services?.find(s => s.serviceId === packageId);
                const base = pkg ? pkg.basePrice : 0;
                
                let addOnsPrice = 0;
                addOnIds.forEach(id => {
                    const addOn = db.services?.find(s => s.serviceId === id);
                    if (addOn) addOnsPrice += addOn.basePrice;
                });
                
                const subtotal = base + addOnsPrice;
                
                // Tier discount calculation
                let discountPct = 0;
                if (currentUser && currentUser.customer) {
                    const tier = db.tiers?.find(t => t.tierId === currentUser.customer.tierId);
                    if (tier) discountPct = tier.discountPercent;
                }
                const tierDiscount = Math.round(subtotal * (discountPct / 100));
                
                // Voucher discount calculation
                let voucherDiscount = 0;
                if (voucherId) {
                    const red = db.redemptions?.find(r => r.redemptionId === voucherId);
                    if (red) {
                        const rew = db.rewards?.find(r => r.rewardId === red.rewardId);
                        if (rew) voucherDiscount = rew.discountRate;
                    }
                }
                
                const total = Math.max(0, subtotal - tierDiscount - voucherDiscount);
                return { base, addOnsPrice, subtotal, tierDiscount, voucherDiscount, total };
            };

            // Trigger OTP
            const triggerOtpAuth = (type, payload) => {
                const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                alert(`[AutoWash OTP SERVICE]: Mã xác thực OTP của bạn là: ${generatedOtp}`);
                setOtpModal({ type, payload, correctOtp: generatedOtp, inputOtp: "" });
            };

            const verifyOtp = () => {
                if (otpModal.inputOtp === otpModal.correctOtp || otpModal.inputOtp === "123456") {
                    if (otpModal.type === "register") {
                        const { fullName, email, password } = otpModal.payload;
                        const newAccId = "A" + (db.accounts.length + 1).toString().padStart(3, "0");
                        const newAcc = { accountId: newAccId, fullName, email, role: "Customer", isActive: true, password };
                        
                        const newCustId = "C" + (db.customers.length + 1).toString().padStart(3, "0");
                        const newCust = { customerId: newCustId, accountId: newAccId, pointBalance: 0, tierId: "T001" };
                        
                        updateTable("accounts", [...db.accounts, newAcc]);
                        updateTable("customers", [...db.customers, newCust]);
                        
                        alert("Đăng ký tài khoản mới thành công!");
                        setAuthMode("login");
                    } else if (otpModal.type === "vehicle") {
                        const { brand, model, licensePlate, vehicleName } = otpModal.payload;
                        const newVehId = "V" + (db.vehicles.length + 1).toString().padStart(3, "0");
                        const newVeh = {
                            vehicleId: newVehId,
                            customerId: currentUser.customer.customerId,
                            licensePlate, brand, model, vehicleName,
                            registeredAt: new Date().toISOString()
                        };
                        updateTable("vehicles", [...db.vehicles, newVeh]);
                        alert("Đăng ký liên kết xe máy mới thành công!");
                        setVehicleInput({ brand: "", model: "", licensePlate: "", vehicleName: "" });
                    }
                    setOtpModal(null);
                } else {
                    alert("Mã OTP không trùng khớp!");
                }
            };

            // Book Wash Appointment Submission
            const completeBooking = () => {
                const { packageId, addOns, vehicleId, date, time, voucherId } = bookingWizard;
                if (!packageId || !vehicleId || !date || !time) {
                    alert("Hãy cung cấp đủ thông tin phương tiện và giờ hẹn!");
                    return;
                }

                // Check slot limits (mock 3 cars max per slot)
                const targetTime = `${date}T${time}`;
                const slotsCount = db.bookings.filter(b => b.scheduleAt === targetTime && b.status !== 'Cancelled').length;
                if (slotsCount >= 3) {
                    alert("Rất tiếc! Khung giờ này đã quá tải lượt đặt. Vui lòng chọn giờ khác.");
                    return;
                }

                const costs = getCalculatedCosts(packageId, addOns, voucherId);
                const newBookId = "B" + (db.bookings.length + 1).toString().padStart(3, "0");
                const newBook = {
                    bookingId: newBookId,
                    customerId: currentUser.customer.customerId,
                    vehicleId,
                    scheduleAt: targetTime,
                    status: "Confirmed",
                    basePrice: costs.subtotal,
                    finalPrice: costs.total,
                    createAt: new Date().toISOString(),
                    checkInAt: null,
                    washingAt: null,
                    completeAt: null,
                    cancelledAt: null,
                    tierId: currentUser.customer.tierId,
                    voucherId: voucherId || null,
                    employeeId: db.employees?.[0]?.employeeId || null,
                    rating: null,
                    reviewText: ""
                };

                // Deduct loyalty points earned
                const pointsEarned = Math.floor(costs.total / 10000);
                const updatedCustomers = db.customers.map(c => {
                    if (c.customerId === currentUser.customer.customerId) {
                        const newPts = c.pointBalance + pointsEarned;
                        // Tier upgrade checks
                        let newTier = c.tierId;
                        const gold = db.tiers.find(t => t.tierName === "Gold");
                        const silver = db.tiers.find(t => t.tierName === "Silver");
                        const platinum = db.tiers.find(t => t.tierName === "Platinum");
                        if (newPts >= platinum.minRankingBalance) newTier = platinum.tierId;
                        else if (newPts >= gold.minRankingBalance) newTier = gold.tierId;
                        else if (newPts >= silver.minRankingBalance) newTier = silver.tierId;
                        return { ...c, pointBalance: newPts, tierId: newTier };
                    }
                    return c;
                });
                updateTable("customers", updatedCustomers);

                // Add points transaction
                const newTxId = "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0");
                const newTx = {
                    transactionId: newTxId,
                    customerId: currentUser.customer.customerId,
                    points: pointsEarned,
                    reason: `Tích lũy từ đặt lịch ${newBookId}`,
                    date: new Date().toISOString()
                };
                updateTable("loyaltyTransactions", [...db.loyaltyTransactions, newTx]);

                // Update voucher state to used
                if (voucherId) {
                    const updatedRed = db.redemptions.map(r => r.redemptionId === voucherId ? { ...r, status: "Used", useAt: new Date().toISOString() } : r);
                    updateTable("redemptions", updatedRed);
                }

                updateTable("bookings", [...db.bookings, newBook]);
                
                // Setup push notification
                const newNotif = {
                    id: notifications.length + 1,
                    customerId: currentUser.customer.customerId,
                    title: "Đặt lịch thành công!",
                    body: `Lịch đặt ${newBookId} vào lúc ${time} ngày ${date} của bạn đã được xác nhận.`,
                    read: false,
                    time: "Vừa xong"
                };
                setNotifications([newNotif, ...notifications]);

                alert(`Đơn đặt rửa xe thành công! Bạn được cộng +${pointsEarned} điểm thành viên.`);
                setBookingWizard({ step: 1, packageId: "", addOns: [], vehicleId: "", date: "", time: "", voucherId: "", costs: null });
                setCustomerSubTab("history");
            };

            // Redeem rewards helper
            const redeemRewardsAction = (reward) => {
                const cost = reward.pointCost;
                if (currentUser.customer.pointBalance < cost) {
                    alert("Số dư điểm của bạn không đủ để đổi voucher này!");
                    return;
                }

                const updatedCustomers = db.customers.map(c => {
                    if (c.customerId === currentUser.customer.customerId) {
                        return { ...c, pointBalance: c.pointBalance - cost };
                    }
                    return c;
                });
                updateTable("customers", updatedCustomers);

                const newRedId = "RDM" + (db.redemptions.length + 1).toString().padStart(3, "0");
                const newRed = {
                    redemptionId: newRedId,
                    customerId: currentUser.customer.customerId,
                    rewardId: reward.rewardId,
                    status: "Active",
                    useAt: null,
                    code: `AW${reward.discountRate/1000}K-${Math.random().toString(36).substring(2, 6).toUpperCase()}`
                };
                updateTable("redemptions", [...db.redemptions, newRed]);

                const newTxId = "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0");
                const newTx = {
                    transactionId: newTxId,
                    customerId: currentUser.customer.customerId,
                    points: -cost,
                    reason: `Đổi voucher ${reward.rewardName}`,
                    date: new Date().toISOString()
                };
                updateTable("loyaltyTransactions", [...db.loyaltyTransactions, newTx]);

                // Update current login user state points
                setCurrentUser(prev => ({
                    ...prev,
                    customer: updatedCustomers.find(c => c.customerId === prev.customer.customerId)
                }));

                alert(`Đổi quà thành công! Bạn đã đổi lấy voucher ${reward.rewardName}`);
            };

            const cancelBooking = (b) => {
                const updated = db.bookings.map(x => x.bookingId === b.bookingId ? { ...x, status: "Cancelled", cancelledAt: new Date().toISOString() } : x);
                updateTable("bookings", updated);
                alert("Đã hủy lịch đặt rửa xe.");
            };

            const getVehicleNameStr = (vId) => {
                const v = db.vehicles?.find(x => x.vehicleId === vId);
                return v ? `${v.brand} ${v.model} (${v.licensePlate})` : "Không rõ";
            };

            const getCustomerName = (cId) => {

                                                                                }}
                                                                                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white text-xs font-bold px-3 py-1.5 rounded">
                                                                                Sửa %
                                                                            </button>
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            )}

                                            {/* Admin Subtab: REVENUE REPORTS */}
                                            {adminSubTab === "reports" && (
                                                <div className="flex flex-col gap-6">
                                                    <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 material-shadow">
                                                        <h3 className="font-extrabold text-base mb-4 text-slate-850 dark:text-white">Thống Kê Doanh Thu Rửa Xe Từng Ngày (7 ngày qua)</h3>
                                                        
                                                        {/* Simulated Bar Charts */}
                                                        <div className="h-64 w-full flex items-end justify-between px-6 pt-6 border-b border-l border-slate-200 dark:border-slate-750">
                                                            <div className="w-10 bg-blue-600 rounded-t-lg transition-all duration-300" style={{ height: "45%" }} title="Thứ Hai: 1.2M"></div>
                                                            <div className="w-10 bg-blue-600 rounded-t-lg transition-all duration-300" style={{ height: "65%" }} title="Thứ Ba: 2.8M"></div>
                                                            <div className="w-10 bg-blue-600 rounded-t-lg transition-all duration-300" style={{ height: "35%" }} title="Thứ Tư: 1.5M"></div>
                                                            <div className="w-10 bg-blue-600 rounded-t-lg transition-all duration-300" style={{ height: "80%" }} title="Thứ Năm: 3.9M"></div>
                                                            <div className="w-10 bg-blue-600 rounded-t-lg transition-all duration-300" style={{ height: "70%" }} title="Thứ Sáu: 3.2M"></div>
                                                            <div className="w-10 bg-blue-500 rounded-t-lg transition-all duration-300" style={{ height: "95%" }} title="Thứ Bảy: 4.8M"></div>
                                                            <div className="w-10 bg-indigo-600 rounded-t-lg transition-all duration-300" style={{ height: "85%" }} title="Chủ Nhật: 4.2M"></div>
                                                        </div>
                                                        <div className="flex justify-between text-xs text-slate-400 mt-3 px-4 font-bold">
                                                            <span>Thứ 2</span><span>Thứ 3</span><span>Thứ 4</span><span>Thứ 5</span><span>Thứ 6</span><span>Thứ 7</span><span>Chủ Nhật</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                        </div>
                                    </div>
                                )}

                            </div>
                        )}

                        {/* ==================================================
                            DATABASE INSPECTOR (LOCALSTORAGE RAW ROWS VIEW)
                           ================================================== */}
                        {viewMode === "db-inspector" && (
                            <div className="glass-card rounded-2xl p-6 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 w-full max-w-5xl material-shadow">
                                <div className="flex justify-between items-center mb-6 border-b border-slate-200 dark:border-slate-800 pb-4 flex-wrap gap-3">
                                    <div>
                                        <h2 className="text-xl font-black text-slate-850 dark:text-white flex items-center gap-2">
                                            <span className="material-symbols-outlined text-blue-600">database</span> Database Tabular Inspector
                                        </h2>
                                        <p className="text-xs text-slate-400 mt-1">Đồng bộ dữ liệu LocalStorage thời gian thực, phục vụ nghiệm thu đồ án capstone.</p>
                                    </div>
                                    <button 
                                        onClick={resetDatabase}
                                        className="bg-transparent hover:bg-rose-50 text-rose-500 font-extrabold border border-rose-200 dark:border-rose-900/60 px-4 py-2 rounded-xl text-xs transition">
                                        Reset Database về Seed ban đầu
                                    </button>
                                </div>

                                <div className="flex flex-col gap-6">
                                    {Object.keys(db).map(key => (
                                        <div key={key} className="bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-4">
                                            <div className="flex justify-between items-center mb-3">
                                                <h4 className="font-extrabold text-xs uppercase text-blue-600 tracking-wider">autowash_{key} ({db[key]?.length || 0} rows)</h4>
                                                <button onClick={() => {
                                                    alert(JSON.stringify(db[key], null, 2));
                                                }} className="text-slate-400 hover:text-slate-200 text-xs font-bold">Xem Raw JSON</button>
                                            </div>
                                            <pre className="text-[10px] text-slate-500 max-h-36 overflow-y-auto bg-slate-100 dark:bg-slate-900/40 p-3 rounded border border-slate-200 dark:border-slate-800/60">
                                                {JSON.stringify(db[key], null, 2)}
                                            </pre>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </div>

                    {/* --- GLOBAL SIMULATED MODALS --- */}
                    
                    {/* OTP MODAL */}
                    {otpModal && (
                        <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white dark:bg-slate-850 border border-slate-200 dark:border-slate-700 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
                                <h3 className="font-extrabold text-slate-900 dark:text-white text-base text-center mb-2">Nhập mã xác thực OTP</h3>
                                <p className="text-xs text-slate-400 text-center mb-6">Mã OTP gồm 6 chữ số đã được gửi tới số điện thoại/email liên kết.</p>
                                
                                <div className="mb-6 text-center">
                                    <input 
                                        type="text"
                                        value={otpModal.inputOtp}
                                        onChange={(e) => setOtpModal(prev => ({ ...prev, inputOtp: e.target.value }))}
                                        placeholder="Nhập 6 chữ số (hoặc 123456)" 
                                        className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-250 dark:border-slate-750 text-center text-xl tracking-[0.2em] font-extrabold rounded-xl px-4 py-3 text-slate-800 dark:text-white outline-none focus:border-blue-500" 
                                    />
                                    <span className="text-[10px] text-slate-400 block mt-2">Mã gợi ý: <strong className="text-blue-600">{otpModal.correctOtp}</strong> (nhập mã này hoặc 123456 để hoàn tất)</span>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => setOtpModal(null)} className="w-1/3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-750 text-slate-700 dark:text-white font-bold py-2.5 rounded-xl text-xs transition">Hủy bỏ</button>
                                    <button onClick={verifyOtp} className="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-2.5 rounded-xl text-xs transition shadow-lg shadow-blue-500/25">Xác Nhận OTP</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            if(window.lucide) {
                lucide.createIcons();
            }
        }, 1000);
    </script>
</body>
</html>
