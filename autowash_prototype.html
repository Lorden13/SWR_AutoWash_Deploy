<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWash Pro - Responsive & Multi-View Prototype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* Mobile Simulator frame styles */
        .mobile-device {
            width: 375px;
            height: 812px;
            border: 12px solid #1e293b;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(6, 182, 212, 0.15), 0 0 0 1px rgba(255,255,255,0.05);
            background-color: #070a13;
            position: relative;
            overflow: hidden;
        }
        .mobile-screen-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 70px; /* space for bottom tab bar */
            padding-top: 44px;    /* space for top status bar */
        }
        .mobile-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: #070a13;
            z-index: 40;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .mobile-nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(7, 10, 19, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 40;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 8px;
        }
        .mobile-home-indicator {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 100px;
            opacity: 0.8;
            z-index: 50;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0b0f19',
                            darker: '#05070c',
                            cyan: '#06b6d4',
                            emerald: '#10b981',
                            violet: '#8b5cf6',
                            rose: '#f43f5e',
                            amber: '#f59e0b',
                            slate: '#1f2937'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ERD SYNCHRONIZED SEED DATA ---
        const INITIAL_ACCOUNTS = [
            { accountId: "A001", fullName: "Admin System", email: "admin@autowash.com", role: "Admin", isActive: true, isNew: false, password: "admin123" },
            { accountId: "A002", fullName: "Phạm Duy Khánh", email: "customer@autowash.com", role: "Customer", isActive: true, isNew: false, password: "customer123" }
        ];

        const INITIAL_CUSTOMERS = [
            { customerId: "C001", accountId: "A002", pointBalance: 350, tierId: "T003" } // Gold Tier
        ];

        const INITIAL_VEHICLES = [
            { vehicleId: "V001", customerId: "C001", licensePlate: "59A-123.45", brand: "Honda", model: "SH 150i", vehicleName: "SH Đen", registeredAt: "2026-06-15T09:00:00Z" }
        ];

        const INITIAL_BOOKINGS = [
            { 
                bookingId: "B001", customerId: "C001", vehicleId: "V001", 
                scheduleAt: "2026-07-15T10:00", status: "Pending", 
                basePrice: 150000, finalPrice: 135000, 
                createAt: "2026-07-13T21:00", checkInAt: null, washingAt: null, 
                completeAt: null, cancelledAt: null, cancelReason: null, 
                cancelledBy: null, tierId: "T003", queueId: null, cancelReason2: null 
            }
        ];

        const INITIAL_SERVICES = [
            { serviceId: "S001", serviceName: "Rửa Nhanh (Quick Wash)", category: "Wash Package", basePrice: 50000, estimateMinutes: 15 },
            { serviceId: "S002", serviceName: "Rửa Tiêu Chuẩn (Standard)", category: "Wash Package", basePrice: 80000, estimateMinutes: 25 },
            { serviceId: "S003", serviceName: "Rửa Cao Cấp (Premium)", category: "Wash Package", basePrice: 150000, estimateMinutes: 40 },
            { serviceId: "S004", serviceName: "Đánh Bóng Gầm", category: "Add-on", basePrice: 20000, estimateMinutes: 10 },
            { serviceId: "S005", serviceName: "Vệ Sinh Khoang Máy", category: "Add-on", basePrice: 50000, estimateMinutes: 15 }
        ];

        const INITIAL_BOOKING_SERVICES = [
            { bookingServiceId: "BS001", bookingId: "B001", serviceId: "S003" }
        ];

        const INITIAL_TIERS = [
            { tierId: "T001", tierName: "Member", minRankingBalance: 0, bookingWindowDays: 7, queuePriority: 0, discountPercent: 0, pointMultiplier: 1.0, maintainBalance: 0 },
            { tierId: "T002", tierName: "Silver", minRankingBalance: 100, bookingWindowDays: 10, queuePriority: 1, discountPercent: 5, pointMultiplier: 1.1, maintainBalance: 80 },
            { tierId: "T003", tierName: "Gold", minRankingBalance: 300, bookingWindowDays: 12, queuePriority: 2, discountPercent: 10, pointMultiplier: 1.2, maintainBalance: 240 },
            { tierId: "T004", tierName: "Platinum", minRankingBalance: 500, bookingWindowDays: 14, queuePriority: 3, discountPercent: 15, pointMultiplier: 1.5, maintainBalance: 400 }
        ];

        const INITIAL_PAYMENTS = [
            { paymentId: "P001", bookingId: "B001", amount: 135000, status: "Paid", createAt: "2026-07-13T21:05:00Z", paidAt: "2026-07-13T21:07:00Z", cancelReason: null }
        ];

        const INITIAL_REWARDS = [
            { rewardId: "R001", rewardName: "Voucher giảm 20k Đánh Bóng Gầm", pointCost: 50, minTierId: "T001", discountRate: 20000, isActive: true, bookingId: null, cancelReason: null, tierId: "T001", serviceId: "S004", validate: 90, stockLimit: 100 },
            { rewardId: "R002", rewardName: "Voucher giảm 50k Rửa Cao Cấp", pointCost: 150, minTierId: "T002", discountRate: 50000, isActive: true, bookingId: null, cancelReason: null, tierId: "T002", serviceId: "S003", validate: 90, stockLimit: 50 },
            { rewardId: "R003", rewardName: "Voucher giảm 100k cho hóa đơn", pointCost: 300, minTierId: "T003", discountRate: 100000, isActive: true, bookingId: null, cancelReason: null, tierId: "T003", serviceId: null, validate: 90, stockLimit: 30 }
        ];

        const INITIAL_REWARD_REDEMPTIONS = [
            { redemptionId: "RDM001", customerId: "C001", rewardId: "R001", status: "Active", useAt: null }
        ];

        const INITIAL_QUEUES = [
            { queueId: "Q001", customerId: "C001", vehicleId: "V001", bookingId: "B001", queueStatus: "Waiting" }
        ];

        const INITIAL_LOYALTY_TRANSACTIONS = [
            { transactionId: "LT001", CustomercusId: "C001", customerId: "C001", bookingId: null, Reward_RedemptionredeemptionId: null, points: 350, createDate: "2026-06-15T09:05:00Z", amount: 350 }
        ];

        const INITIAL_TIER_PERKS = [
            { perkId: "PK001", tierId: "T003", serviceId: "S004", perkValue: 10 },
            { perkId: "PK002", tierId: "T004", serviceId: "S005", perkValue: 15 }
        ];

        const INITIAL_RESCHEDULE_HISTORY = [
            { bookingRescheduelHistoryId: "BRH001", bookingId: "B001", oldScheduleAt: "2026-07-15T09:00", newScheduleAt: "2026-07-15T10:00", changeBy: "Customer", createAt: "2026-07-13T21:02:00Z", cancelReason: null }
        ];

        function App() {
            const [roleTab, setRoleTab] = useState("customer");
            // Toggle view for Customer: "mobile" | "desktop"
            const [customerViewMode, setCustomerViewMode] = useState("mobile");
            
            // Authentication state
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState(null); // Account + Customer info
            const [authMode, setAuthMode] = useState("login"); // "login" | "register"
            
            // Database state loaded from LocalStorage or seeded
            const [db, setDb] = useState({});
            
            // Temporary Modal States
            const [otpModal, setOtpModal] = useState(null);
            const [paymentModal, setPaymentModal] = useState(null);
            const [invoiceModal, setInvoiceModal] = useState(null);
            const [rescheduleModal, setRescheduleModal] = useState(null);
            const [adjustmentModal, setAdjustmentModal] = useState(null);
            
            // UI States for Customer
            const [activeCustomerSubTab, setActiveCustomerSubTab] = useState("dashboard"); // "dashboard", "booking", "vehicles", "rewards", "profile"
            const [bookingStep, setBookingStep] = useState(1);
            const [newBooking, setNewBooking] = useState({ vehicleId: "", date: "", time: "", packageId: "", addOns: [], voucherId: "" });
            const [profileForm, setProfileForm] = useState({ fullName: "", phone: "", currentPassword: "", newPassword: "" });
            const [vehicleForm, setVehicleForm] = useState({ licensePlate: "", brand: "", model: "", vehicleName: "" });
            
            // UI States for Admin
            const [activeAdminSubTab, setActiveAdminSubTab] = useState("queue");
            const [serviceForm, setServiceForm] = useState({ serviceId: "", serviceName: "", category: "Wash Package", basePrice: 0, estimateMinutes: 15 });
            const [rewardForm, setRewardForm] = useState({ rewardId: "", rewardName: "", pointCost: 0, minTierId: "T001", discountRate: 0, isActive: true, bookingId: null, cancelReason: null, tierId: "T001", serviceId: "", validate: 90, stockLimit: 100 });
            
            // Initialize Database
            useEffect(() => {
                const loadTable = (key, defaultData) => {
                    const stored = localStorage.getItem(`autowash_${key}`);
                    if (stored) {
                        return JSON.parse(stored);
                    } else {
                        localStorage.setItem(`autowash_${key}`, JSON.stringify(defaultData));
                        return defaultData;
                    }
                };

                const initialDb = {
                    accounts: loadTable("accounts", INITIAL_ACCOUNTS),
                    customers: loadTable("customers", INITIAL_CUSTOMERS),
                    vehicles: loadTable("vehicles", INITIAL_VEHICLES),
                    bookings: loadTable("bookings", INITIAL_BOOKINGS),
                    services: loadTable("services", INITIAL_SERVICES),
                    bookingServices: loadTable("booking_services", INITIAL_BOOKING_SERVICES),
                    tiers: loadTable("tiers", INITIAL_TIERS),
                    payments: loadTable("payments", INITIAL_PAYMENTS),
                    rewards: loadTable("rewards", INITIAL_REWARDS),
                    redemptions: loadTable("redemptions", INITIAL_REWARD_REDEMPTIONS),
                    queue: loadTable("queue", INITIAL_QUEUES),
                    loyaltyTransactions: loadTable("loyalty_transactions", INITIAL_LOYALTY_TRANSACTIONS),
                    rescheduleHistory: loadTable("reschedule_history", INITIAL_RESCHEDULE_HISTORY),
                    tierPerks: loadTable("tier_perks", INITIAL_TIER_PERKS)
                };
                setDb(initialDb);
            }, []);

            // Save tables helper
            const saveTable = (key, data) => {
                localStorage.setItem(`autowash_${key}`, JSON.stringify(data));
                setDb(prev => ({ ...prev, [key]: data }));
            };

            // Reset DB Helper
            const resetDatabase = () => {
                localStorage.clear();
                window.location.reload();
            };

            // Login function
            const handleLogin = (email, password) => {
                const acc = db.accounts.find(a => a.email === email && a.password === password);
                if (acc) {
                    if (!acc.isActive) {
                        alert("Tài khoản này đã bị khóa!");
                        return;
                    }
                    let cust = null;
                    if (acc.role === "Customer") {
                        cust = db.customers.find(c => c.accountId === acc.accountId);
                    }
                    setCurrentUser({ ...acc, customer: cust });
                    setIsLoggedIn(true);
                    if (acc.role === "Admin") {
                        setRoleTab("admin");
                    } else {
                        setRoleTab("customer");
                        setActiveCustomerSubTab("dashboard");
                        setProfileForm({ fullName: acc.fullName, phone: "0901234567", currentPassword: "", newPassword: "" });
                    }
                } else {
                    alert("Sai email hoặc mật khẩu!");
                }
            };

            // Logout function
            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser(null);
            };

            // Render OTP Trigger
            const triggerOtp = (type, data) => {
                const randomOtp = Math.floor(100000 + Math.random() * 900000).toString();
                alert(`[MOCK OTP SERVICE]: Mã OTP xác thực của bạn là: ${randomOtp}`);
                setOtpModal({ type, data, correctOtp: randomOtp, inputOtp: "" });
            };

            // Complete OTP Verification
            const verifyOtpCode = () => {
                if (otpModal.inputOtp === otpModal.correctOtp || otpModal.inputOtp === "123456") {
                    if (otpModal.type === "register") {
                        const { fullName, email, password } = otpModal.data;
                        const newAccId = "A" + (db.accounts.length + 1).toString().padStart(3, "0");
                        const newAcc = { accountId: newAccId, fullName, email, role: "Customer", isActive: true, isNew: true, password };
                        const updatedAccounts = [...db.accounts, newAcc];
                        saveTable("accounts", updatedAccounts);

                        const newCustId = "C" + (db.customers.length + 1).toString().padStart(3, "0");
                        const newCust = { customerId: newCustId, accountId: newAccId, pointBalance: 0, tierId: "T001" };
                        const updatedCustomers = [...db.customers, newCust];
                        saveTable("customers", updatedCustomers);
                        
                        alert("Đăng ký tài khoản thành công! Xin hãy đăng nhập.");
                        setAuthMode("login");
                    } else if (otpModal.type === "vehicle") {
                        const { licensePlate, brand, model, vehicleName } = otpModal.data;
                        const newVehId = "V" + (db.vehicles.length + 1).toString().padStart(3, "0");
                        const newVeh = { 
                            vehicleId: newVehId, customerId: currentUser.customer.customerId, 
                            licensePlate, brand, model, vehicleName, registeredAt: new Date().toISOString() 
                        };
                        const updatedVehicles = [...db.vehicles, newVeh];
                        saveTable("vehicles", updatedVehicles);
                        alert("Đăng ký xe thành công!");
                        setVehicleForm({ licensePlate: "", brand: "", model: "", vehicleName: "" });
                        setCurrentUser(prev => ({
                            ...prev,
                            customer: db.customers.find(c => c.accountId === prev.accountId)
                        }));
                    }
                    setOtpModal(null);
                } else {
                    alert("Sai mã OTP! Xin hãy kiểm tra lại.");
                }
            };

            // Booking calculations helper
            const getBookingCosts = (packageId, addOnIds) => {
                const pkg = db.services.find(s => s.serviceId === packageId);
                const base = pkg ? pkg.basePrice : 0;
                
                let addonsPrice = 0;
                addOnIds.forEach(id => {
                    const serv = db.services.find(s => s.serviceId === id);
                    if (serv) addonsPrice += serv.basePrice;
                });
                
                const rawTotal = base + addonsPrice;
                
                const tier = db.tiers.find(t => t.tierId === currentUser.customer.tierId);
                const discountPct = tier ? tier.discountPercent : 0;
                const tierDiscountVal = Math.round(rawTotal * (discountPct / 100));
                
                let voucherVal = 0;
                if (newBooking.voucherId) {
                    const red = db.redemptions.find(r => r.redemptionId === newBooking.voucherId);
                    if (red) {
                        const rew = db.rewards.find(rw => rw.rewardId === red.rewardId);
                        if (rew) voucherVal = rew.discountRate;
                    }
                }
                
                const final = Math.max(0, rawTotal - tierDiscountVal - voucherVal);
                return { base: rawTotal, tierDiscount: tierDiscountVal, voucherDiscount: voucherVal, final };
            };

            // Trigger Make Payment
            const payBookingOnline = (booking) => {
                setPaymentModal(booking);
            };

            // Handle online payment submission
            const confirmOnlinePayment = () => {
                const updatedBookings = db.bookings.map(b => {
                    if (b.bookingId === paymentModal.bookingId) {
                        return { ...b, status: "Paid" };
                    }
                    return b;
                });
                saveTable("bookings", updatedBookings);

                const newPay = {
                    paymentId: "P" + (db.payments.length + 1).toString().padStart(3, "0"),
                    bookingId: paymentModal.bookingId,
                    amount: paymentModal.finalPrice,
                    status: "Paid",
                    createAt: new Date().toISOString(),
                    paidAt: new Date().toISOString(),
                    cancelReason: null
                };
                saveTable("payments", [...db.payments, newPay]);

                const earnedPoints = Math.floor(paymentModal.finalPrice / 10000);
                const customer = db.customers.find(c => c.customerId === paymentModal.customerId);
                const updatedCustomers = db.customers.map(c => {
                    if (c.customerId === paymentModal.customerId) {
                        const newPts = c.pointBalance + earnedPoints;
                        let newTier = c.tierId;
                        const goldTier = db.tiers.find(t => t.tierName === "Gold");
                        const silverTier = db.tiers.find(t => t.tierName === "Silver");
                        const platTier = db.tiers.find(t => t.tierName === "Platinum");
                        if (newPts >= platTier.minRankingBalance) newTier = platTier.tierId;
                        else if (newPts >= goldTier.minRankingBalance) newTier = goldTier.tierId;
                        else if (newPts >= silverTier.minRankingBalance) newTier = silverTier.tierId;
                        return { ...c, pointBalance: newPts, tierId: newTier };
                    }
                    return c;
                });
                saveTable("customers", updatedCustomers);

                const newTrans = {
                    transactionId: "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0"),
                    CustomercusId: paymentModal.customerId,
                    customerId: paymentModal.customerId,
                    bookingId: paymentModal.bookingId,
                    Reward_RedemptionredeemptionId: null,
                    points: earnedPoints,
                    createDate: new Date().toISOString(),
                    amount: earnedPoints
                };
                saveTable("loyaltyTransactions", [...db.loyaltyTransactions, newTrans]);

                if (paymentModal.voucherId) {
                    const updatedRed = db.redemptions.map(r => {
                        if (r.redemptionId === paymentModal.voucherId) {
                            return { ...r, status: "Used", useAt: new Date().toISOString() };
                        }
                        return r;
                    });
                    saveTable("redemptions", updatedRed);
                }

                alert(`Thanh toán thành công! Bạn được cộng +${earnedPoints} điểm loyalty.`);
                setPaymentModal(null);
                setCurrentUser(prev => ({
                    ...prev,
                    customer: updatedCustomers.find(c => c.accountId === prev.accountId)
                }));
            };

            // Cancel booking logic
            const cancelBooking = (booking, reason) => {
                const scheduleDate = new Date(booking.scheduleAt);
                const now = new Date();
                const diffMs = scheduleDate - now;
                const diffHrs = diffMs / (1000 * 60 * 60);

                if (diffHrs < 1.0) {
                    alert("Không thể tự hủy lịch hẹn trước giờ hẹn dưới 1 tiếng!");
                    return;
                }

                const updatedBookings = db.bookings.map(b => {
                    if (b.bookingId === booking.bookingId) {
                        return { ...b, status: "Cancelled", cancelledAt: new Date().toISOString(), cancelReason: reason, cancelReason2: reason, cancelledBy: "Customer" };
                    }
                    return b;
                });
                saveTable("bookings", updatedBookings);
                
                const updatedQueue = db.queue.map(q => {
                    if (q.bookingId === booking.bookingId) {
                        return { ...q, queueStatus: "Cancelled" };
                    }
                    return q;
                });
                saveTable("queue", updatedQueue);

                alert("Hủy lịch thành công!");
            };

            // Make Redeem Reward
            const redeemReward = (reward) => {
                const cust = currentUser.customer;
                if (cust.pointBalance < reward.pointCost) {
                    alert("Bạn không đủ điểm để đổi phần thưởng này!");
                    return;
                }

                const updatedCustomers = db.customers.map(c => {
                    if (c.customerId === cust.customerId) {
                        return { ...c, pointBalance: c.pointBalance - reward.pointCost };
                    }
                    return c;
                });
                saveTable("customers", updatedCustomers);

                const newRedId = "RDM" + (db.redemptions.length + 1).toString().padStart(3, "0");
                const newRed = {
                    redemptionId: newRedId,
                    customerId: cust.customerId,
                    rewardId: reward.rewardId,
                    status: "Active",
                    useAt: null
                };
                saveTable("redemptions", [...db.redemptions, newRed]);

                const newTrans = {
                    transactionId: "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0"),
                    CustomercusId: cust.customerId,
                    customerId: cust.customerId,
                    bookingId: null,
                    Reward_RedemptionredeemptionId: newRedId,
                    points: -reward.pointCost,
                    createDate: new Date().toISOString(),
                    amount: -reward.pointCost
                };
                saveTable("loyaltyTransactions", [...db.loyaltyTransactions, newTrans]);

                alert(`Đổi thưởng thành công! Voucher '${reward.rewardName}' đã được thêm vào ví của bạn.`);
                setCurrentUser(prev => ({
                    ...prev,
                    customer: updatedCustomers.find(c => c.accountId === prev.accountId)
                }));
            };

            // Admin: Update Wash Queue State
            const updateQueueStatus = (queueItem, nextStatus) => {
                const updatedQueue = db.queue.map(q => {
                    if (q.queueId === queueItem.queueId) {
                        return { ...q, queueStatus: nextStatus };
                    }
                    return q;
                });
                saveTable("queue", updatedQueue);

                const updatedBookings = db.bookings.map(b => {
                    if (b.bookingId === queueItem.bookingId) {
                        const updates = { status: nextStatus };
                        if (nextStatus === "Washing") updates.washingAt = new Date().toISOString();
                        if (nextStatus === "Completed") {
                            updates.completeAt = new Date().toISOString();
                            setInvoiceModal({ ...b, ...updates });
                        }
                        return { ...b, ...updates };
                    }
                    return b;
                });
                saveTable("bookings", updatedBookings);
            };

            // Admin: Process Cash/Card Checkout Payment
            const confirmCheckoutPayment = (bookingId, finalAmount, method) => {
                const updatedBookings = db.bookings.map(b => {
                    if (b.bookingId === bookingId) {
                        return { ...b, status: "Paid" };
                    }
                    return b;
                });
                saveTable("bookings", updatedBookings);

                const updatedQueue = db.queue.map(q => {
                    if (q.bookingId === bookingId) {
                        return { ...q, queueStatus: "Paid" };
                    }
                    return q;
                });
                saveTable("queue", updatedQueue);

                const newPay = {
                    paymentId: "P" + (db.payments.length + 1).toString().padStart(3, "0"),
                    bookingId: bookingId,
                    amount: finalAmount,
                    status: "Paid",
                    createAt: new Date().toISOString(),
                    paidAt: new Date().toISOString(),
                    cancelReason: null

                saveTable("payments", [...db.payments, newPay]);

                const booking = db.bookings.find(b => b.bookingId === bookingId);
                const earnedPoints = Math.floor(finalAmount / 10000);
                const updatedCustomers = db.customers.map(c => {
                    if (c.customerId === booking.customerId) {
                        const newPts = c.pointBalance + earnedPoints;
                        let newTier = c.tierId;
                        const goldTier = db.tiers.find(t => t.tierName === "Gold");
                        const silverTier = db.tiers.find(t => t.tierName === "Silver");
                        const platTier = db.tiers.find(t => t.tierName === "Platinum");
                        if (newPts >= platTier.minRankingBalance) newTier = platTier.tierId;
                        else if (newPts >= goldTier.minRankingBalance) newTier = goldTier.tierId;
                        else if (newPts >= silverTier.minRankingBalance) newTier = silverTier.tierId;
                        return { ...c, pointBalance: newPts, tierId: newTier };
                    }
                    return c;
                });
                saveTable("customers", updatedCustomers);

                const newTrans = {
                    transactionId: "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0"),
                    CustomercusId: booking.customerId,
                    customerId: booking.customerId,
                    bookingId: bookingId,
                    Reward_RedemptionredeemptionId: null,
                    points: earnedPoints,
                    createDate: new Date().toISOString(),
                    amount: earnedPoints

                    const goldTier = db.tiers.find(t => t.tierName === "Gold");
                    const silverTier = db.tiers.find(t => t.tierName === "Silver");
                    const platTier = db.tiers.find(t => t.tierName === "Platinum");
                    const memberTier = db.tiers.find(t => t.tierName === "Member");
                    
                    if (pts >= platTier.minRankingBalance) newTier = platTier.tierId;
                    else if (pts >= goldTier.minRankingBalance) newTier = goldTier.tierId;
                    else if (pts >= silverTier.minRankingBalance) newTier = silverTier.tierId;
                    else newTier = memberTier.tierId;
                    
                    return { ...c, tierId: newTier };

                saveTable("customers", updatedCustomers);
                alert("Đã hoàn thành đánh giá lại toàn bộ hạng thành viên khách hàng!");

                    {/* ADMIN PROCESS CHECKOUT INVOICE MODAL (UC013) */}
                    {invoiceModal && (
                        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-brand-dark border border-gray-800 rounded-2xl max-w-md w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-white text-base text-center mb-1">Hóa Đơn Thu Tiền & Checkout</h3>
                                <p className="text-xs text-gray-500 text-center mb-6">Mã cuộc hẹn: <strong className="text-white">{invoiceModal.bookingId}</strong></p>
                                
                                <div className="bg-brand-darker border border-gray-800 p-4 rounded-xl flex flex-col gap-3 mb-6">
                                    <div className="flex justify-between text-xs text-gray-400">
                                        <span>Khách hàng:</span>
                                        <span className="font-bold text-white">{getCustomerName(invoiceModal.customerId)}</span>
                                    </div>
                                    <div className="flex justify-between text-xs text-gray-400">
                                        <span>Phương tiện:</span>
                                        <span className="font-bold text-white">{getVehiclePlate(invoiceModal.vehicleId)}</span>
                                    </div>
                                    <div className="border-t border-gray-800/80 pt-2.5 flex justify-between text-xs text-gray-400">
                                        <span>Gói chính & add-on:</span>
                                        <span className="font-bold text-white">{formatVnd(invoiceModal.basePrice)}</span>
                                    </div>
                                    <div className="flex justify-between text-xs text-gray-400">
                                        <span>Giảm trừ hạng ({db.tiers?.find(t => t.tierId === invoiceModal.tierId)?.tierName}):</span>
                                        <span className="font-bold text-rose-400">-{formatVnd(invoiceModal.basePrice - invoiceModal.finalPrice)}</span>
                                    </div>
                                    <div className="border-t border-gray-800 pt-3 flex justify-between text-sm font-bold">
                                        <span className="text-white">Tổng tiền cần thu:</span>
                                        <span className="text-violet-400">{formatVnd(invoiceModal.finalPrice)}</span>
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => confirmCheckoutPayment(invoiceModal.bookingId, invoiceModal.finalPrice, "Tiền Một (Cash)")} className="w-1/2 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl text-xs transition-all duration-300">
                                        Tiền Mặt (Cash)
                                    </button>
                                    <button onClick={() => confirmCheckoutPayment(invoiceModal.bookingId, invoiceModal.finalPrice, "Quẹt Thẻ (Card)")} className="w-1/2 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-xl text-xs border border-gray-700 transition-all duration-300">
                                        Quẹt Thẻ (POS Card)
                                    </button>
                                </div>
                                <button onClick={() => setInvoiceModal(null)} className="w-full bg-transparent hover:bg-gray-800/20 text-gray-500 font-bold py-2 rounded-xl text-xs mt-3 transition-all duration-300">
                                    Bỏ Qua / Đóng
                                </button>
                            </div>
                        </div>
                    )}

                    {/* ADMIN RESCHEDULE BOOKING MODAL (UC017) */}
                    {rescheduleModal && (
                        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-brand-dark border border-gray-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-white text-base text-center mb-1">Đổi Lịch Hẹn Rửa Xe</h3>
                                <p className="text-xs text-gray-500 text-center mb-6">Mã: <strong className="text-white">{rescheduleModal.bookingId}</strong></p>
                                
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const newDate = e.target.newDate.value;
                                    const newTime = e.target.newTime.value;
                                    if (!newDate || !newTime) return;
                                    const newSchedule = `${newDate}T${newTime}`;
                                    
                                    const newHist = {
                                        bookingRescheduelHistoryId: "BRH" + (db.rescheduleHistory.length + 1).toString().padStart(3, "0"),
                                        bookingId: rescheduleModal.bookingId,
                                        oldScheduleAt: rescheduleModal.scheduleAt,
                                        newScheduleAt: newSchedule,
                                        changeBy: "Admin System",
                                        createAt: new Date().toISOString(),
                                        cancelReason: null
                                    };
                                    saveTable("rescheduleHistory", [...db.rescheduleHistory, newHist]);

                                    const updatedBookings = db.bookings.map(b => b.bookingId === rescheduleModal.bookingId ? { ...b, scheduleAt: newSchedule } : b);
                                    saveTable("bookings", updatedBookings);
                                    alert("Đổi giờ rửa xe thành công!");
                                    setRescheduleModal(null);
                                }} className="flex flex-col gap-4">
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Giờ cũ: {rescheduleModal.scheduleAt.replace('T', ' ')}</label>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Ngày Mới</label>
                                        <input type="date" required name="newDate" className="w-full bg-brand-darker border border-gray-800 rounded-xl px-4 py-2.5 text-white outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Giờ Mới</label>
                                        <select required name="newTime" className="w-full bg-brand-darker border border-gray-800 rounded-xl px-4 py-2.5 text-white outline-none">
                                            <option value="08:00">08:00 - 09:00</option>
                                            <option value="09:00">09:00 - 10:00</option>
                                            <option value="10:00">10:00 - 11:00</option>
                                            <option value="14:00">14:00 - 15:00</option>
                                            <option value="15:00">15:00 - 16:00</option>
                                            <option value="16:00">16:00 - 17:00</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-2 mt-2">
                                        <button type="button" onClick={() => setRescheduleModal(null)} className="w-1/3 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 rounded-xl text-xs">Hủy</button>
                                        <button type="submit" className="w-2/3 bg-violet-600 hover:bg-violet-700 text-white font-bold py-2.5 rounded-xl text-xs">Cập Nhật</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ADMIN MANUAL POINTS ADJUSTMENT MODAL (UC015) */}
                    {adjustmentModal && (
                        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-brand-dark border border-gray-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
                                <h3 className="font-bold text-white text-base text-center mb-1">Điều Chỉnh Điểm Thủ Công</h3>
                                <p className="text-xs text-gray-500 text-center mb-6">Khách hàng: <strong className="text-white">{getCustomerName(adjustmentModal.customerId)}</strong></p>
                                
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const changeVal = Number(e.target.pointsChange.value);
                                    const reason = e.target.reason.value;
                                    if (!changeVal || !reason) return;
                                    
                                    const currentBalance = adjustmentModal.pointBalance;
                                    if (currentBalance + changeVal < 0) {
                                        alert("Số dư điểm sau điều chỉnh không được nhỏ hơn 0!");
                                        return;
                                    }

                                    const updatedCustomers = db.customers.map(c => {
                                        if (c.customerId === adjustmentModal.customerId) {
                                            const newPts = c.pointBalance + changeVal;
                                            let newTier = c.tierId;
                                            const goldTier = db.tiers.find(t => t.tierName === "Gold");
                                            const silverTier = db.tiers.find(t => t.tierName === "Silver");
                                            const platTier = db.tiers.find(t => t.tierName === "Platinum");
                                            const memberTier = db.tiers.find(t => t.tierName === "Member");
                                            
                                            if (newPts >= platTier.minRankingBalance) newTier = platTier.tierId;
                                            else if (newPts >= goldTier.minRankingBalance) newTier = goldTier.tierId;
                                            else if (newPts >= silverTier.minRankingBalance) newTier = silverTier.tierId;
                                            else newTier = memberTier.tierId;

                                            return { ...c, pointBalance: newPts, tierId: newTier };
                                        }
                                        return c;
                                    });
                                    saveTable("customers", updatedCustomers);

                                    const newTrans = {
                                        transactionId: "LT" + (db.loyaltyTransactions.length + 1).toString().padStart(3, "0"),
                                        CustomercusId: adjustmentModal.customerId,
                                        customerId: adjustmentModal.customerId,
                                        bookingId: null,
                                        Reward_RedemptionredeemptionId: null,
                                        points: changeVal,
                                        createDate: new Date().toISOString(),
                                        amount: changeVal
                                    };
                                    saveTable("loyaltyTransactions", [...db.loyaltyTransactions, newTrans]);

                                    alert(`Đã điều chỉnh thành công ${changeVal > 0 ? '+' : ''}${changeVal} điểm! Lý do: ${reason}`);
                                    setAdjustmentModal(null);
                                }} className="flex flex-col gap-4">
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Số Điểm Tăng/Giảm (ví dụ: +50 hoặc -20)</label>
                                        <input type="number" required name="pointsChange" placeholder="+50" className="w-full bg-brand-darker border border-gray-800 rounded-xl px-4 py-2.5 text-white outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Lý Do Điều Chỉnh (Mandatory)</label>
                                        <textarea required name="reason" rows="3" placeholder="Ví dụ: Đền bù..." className="w-full bg-brand-darker border border-gray-800 rounded-xl px-4 py-2.5 text-white outline-none text-xs" />
                                    </div>
                                    <div className="flex gap-2 mt-2">
                                        <button type="button" onClick={() => setAdjustmentModal(null)} className="w-1/3 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 rounded-xl text-xs">Hủy</button>
                                        <button type="submit" className="w-2/3 bg-violet-600 hover:bg-violet-700 text-white font-bold py-2.5 rounded-xl text-xs">Xác Nhận</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            lucide.createIcons();
        }, 1000);
    </script>
</body>
</html>
